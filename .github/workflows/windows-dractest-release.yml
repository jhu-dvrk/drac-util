name: dractest release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-release:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Initialize vcpkg paths
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $toolchainFile = Join-Path $vcpkgRoot "scripts\buildsystems\vcpkg.cmake"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_TOOLCHAIN_FILE=$toolchainFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & (Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat")

      - name: Install Windows dependencies
        shell: pwsh
        run: |
          & (Join-Path $env:VCPKG_ROOT "vcpkg.exe") --classic install glfw3:x64-windows glew:x64-windows

      - name: Show selected toolchain
        shell: pwsh
        run: |
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          Write-Host "CMAKE_TOOLCHAIN_FILE=$env:CMAKE_TOOLCHAIN_FILE"

      - name: Configure
        shell: pwsh
        run: |
          .\scripts\enter-windows-toolchain.ps1 -Command 'cmake --preset windows-msvc-x64'

      - name: Build package
        shell: pwsh
        run: |
          .\scripts\enter-windows-toolchain.ps1 -Command 'cmake --build --preset windows-release --target dractest_package --parallel'

      - name: Build installer
        shell: pwsh
        run: |
          .\scripts\enter-windows-toolchain.ps1 -Command 'cmake --build --preset windows-release --target PACKAGE --parallel'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: dractest-windows-zip-x64
          path: build/windows-msvc-x64/release/dractest-Release-windows-x64.zip
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: dractest-windows-installer-x64
          path: build/windows-msvc-x64/*.exe
          if-no-files-found: error

  build-linux-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libraw1394-dev libglfw3-dev libglew-dev

      - name: Build AppImage
        run: |
          ./scripts/build-linux-appimage.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: dractest-linux-x86_64
          path: build/linux-gcc/release/*.AppImage
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows-release
      - build-linux-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$GITHUB_REF_NAME"
          windows_zip=$(find release-assets/dractest-windows-zip-x64 -maxdepth 1 -type f -name '*.zip' -print -quit)
          windows_installer=$(find release-assets/dractest-windows-installer-x64 -maxdepth 1 -type f -name '*.exe' -print -quit)
          linux_appimage=$(find release-assets/dractest-linux-x86_64 -maxdepth 1 -type f -name '*.AppImage' -print -quit)

          if [[ -z "$windows_zip" || -z "$windows_installer" || -z "$linux_appimage" ]]; then
            echo "Missing one or more release assets" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "$windows_zip" \
              "$windows_installer" \
              "$linux_appimage" \
              --clobber
          else
            gh release create "$tag" \
              "$windows_zip" \
              "$windows_installer" \
              "$linux_appimage" \
              --title "dractest $tag" \
              --generate-notes
          fi

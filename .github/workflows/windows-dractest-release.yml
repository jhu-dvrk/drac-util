name: Windows dractest release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Initialize vcpkg paths
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $toolchainFile = Join-Path $vcpkgRoot "scripts\buildsystems\vcpkg.cmake"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_TOOLCHAIN_FILE=$toolchainFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & (Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat")

      - name: Install Windows dependencies
        shell: pwsh
        run: |
          & (Join-Path $env:VCPKG_ROOT "vcpkg.exe") install glfw3:x64-windows glew:x64-windows

      - name: Show selected toolchain
        shell: pwsh
        run: |
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          Write-Host "CMAKE_TOOLCHAIN_FILE=$env:CMAKE_TOOLCHAIN_FILE"

      - name: Configure
        shell: pwsh
        run: |
          .\scripts\enter-windows-toolchain.ps1 -Command 'cmake --preset windows-msvc-x64'

      - name: Build package
        shell: pwsh
        run: |
          .\scripts\enter-windows-toolchain.ps1 -Command 'cmake --build --preset windows-release --target dractest_package --parallel'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dractest-windows-x64
          path: build/windows-msvc-x64/release/dractest-Release-windows-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $zip = (Resolve-Path "build/windows-msvc-x64/release/dractest-Release-windows-x64.zip").Path
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --clobber
          }
          else {
            gh release create $tag $zip --title "dractest $tag" --generate-notes
          }
